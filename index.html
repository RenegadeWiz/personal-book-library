<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--link for the search icon-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <title>Book Library</title>
</head>
<body>

    <header>

        <nav>

            <h1>Book Library</h1>

            <ul>

                <li>

                    <a href="#">

                        My Books

                    </a>

                </li>

                <li>

                    <a href="#">

                        Favourite Books

                    </a>

                </li>

            </ul>

            <div class="search-box">

                <label for="search-input">

                    <button>

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>
                    
                    <input type="text" id="search-input">

                </label>

            </div>
            
        </nav>

    </header>

    <main>

        <!--Button that opens the pop up menu that lets you add new books-->

        <div class="add-pop-up-btn-container">

            <button class="add-pop-up-btn">
            
                Add book

            </button>

        </div>
        

        <!--Pop up container to add new book-->

        <article class="add-pop-up">

            <!--Button to close the pop up-->

            <button class ='exit-btn'>

                <span class="span-first"></span>

                <span class="span-second"></span>

            </button>

            <!--Body of the pop up-->

            <section class="input-container">

                <label for="book-title-input">
                    
                    Title

                    <input 
                    type="text" placeholder="Book title" id="book-title-input">

                </label>

                <label for="author-input">
                    
                    Author

                    <input 
                    type="text" placeholder="Author" id="author-input">
                    
                </label>

                <label for="book-description-input"
                class="book-description-label">
                    
                    Description

                    <textarea 
                    maxlength ='400' placeholder="Write a description..." class="book-description-input"></textarea>

                    <p class="char-count">
                        
                        0/400
                    
                    </p>
                    
                </label>

                <div>

                    <button class="add-book-btn">

                        Add Book

                    </button>

                </div>

                  

            </section>
            

        </article>

<!--MAIN LIBRARY CONTAINER-->

        <section class="books-container">
    
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
